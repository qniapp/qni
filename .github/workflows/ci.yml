# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: init.defaultBranch
      GIT_CONFIG_VALUE_0: main

    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20.20.2]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: sudo apt-get -y install libpq-dev
      - name: Setup apps/www
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          working-directory: apps/www
          bundler-cache: true
      - name: Setup apps/tutorial
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          working-directory: apps/tutorial
          bundler-cache: true
      - name: Setup DB
        run: |-
          cd apps/www
          cp config/database.yml.github-actions config/database.yml
          bundle exec rails db:setup
        env:
          RAILS_ENV: test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
      - run: pnpm install --frozen-lockfile
      - name: Check Pages migration config
        run: node scripts/check-pages-config.mjs
      - name: Check local build environment config
        run: node scripts/check-local-build-env.mjs
      - run: pnpm build
      - name: Lint Codebase
        run: pnpm lint
      - name: Run Typecheck
        run: pnpm typecheck
      - run: PGHOST=localhost PGUSER=postgres PGPASSWORD=postgres pnpm test:ci
        env:
          RAILS_ENV: test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
      - name: Check Bundle Size
        run: pnpm size
